# Modular RAG MCP Server - Configuration
# Generated by Setup Wizard — DeepSeek + Ollama

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "deepseek"  # Options: openai, azure, deepseek, ollama
  model: "deepseek-chat"
  api_key: "sk-2f4e796deee5439f87fda5d0e6915cad"
  base_url: "https://api.deepseek.com"
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "ollama"  # Options: openai, azure, ollama
  model: "nomic-embed-text"
  dimensions: 768  # nomic-embed-text 固定维度
  base_url: "http://localhost:11434"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true
  provider: "ollama"  # Options: openai, azure, ollama
  model: "llava"
  base_url: "http://localhost:11434"
  max_image_size: 2048  # Max dimension (width/height) for image compression

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, qdrant, pinecone
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true  # Set to true to enable LLM-based reranking
  provider: "llm"  # Uses configured LLM (DeepSeek) for reranking
  model: "deepseek-chat"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 20

  # Chunk Refiner Configuration
  chunk_refiner:
    use_llm: true  # Uses DeepSeek for LLM-based refinement

  # Metadata Enricher Configuration
  metadata_enricher:
    use_llm: true  # Uses DeepSeek for LLM-based enrichment
